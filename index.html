<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KHSAA TV | Live Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        hsRed: '#ff0000',
                        hsRedHover: '#cc0000',
                        hsGreen: '#00c853',
                        hsGreenHover: '#00a844',
                        darkBg: '#0a0a0a',
                        darkCard: '#141414',
                    }
                }
            }
        }
    </script>
    <style>
        .header-compressed-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        .seeker-progress { width: 35%; }
        /* Memastikan gambar fit dan tidak terpotong */
        .object-fit-container {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background-color: #000;
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden min-h-screen pb-safe">

    <!-- HERO BILLBOARD BANNER -->
    <section class="bg-[#141414] border-b-2 border-blue-600 py-10 mt-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center space-x-4 sm:space-x-6 text-center md:text-left">
                    <div class="bg-hsRed text-white font-montserrat font-black tracking-widest text-xs sm:text-sm px-4 py-2 rounded-md flex items-center shrink-0">
                        <span class="w-2.5 h-2.5 bg-white rounded-full mr-2 animate-ping"></span>
                        LIVE
                    </div>
                    <h2 class="header-compressed-text text-3xl sm:text-4xl lg:text-5xl text-white tracking-tight leading-none uppercase">
                        KHSAA TV
                    </h2>
                </div>
                <div class="flex flex-col sm:flex-row md:flex-col gap-3 w-full sm:w-auto">
                    <button onclick="bukaLink()" class="w-full sm:w-44 py-3 bg-hsRed hover:bg-hsRedHover text-white font-montserrat font-black text-xs uppercase tracking-wider rounded transition-all cursor-pointer">
                        Subscribe Now
                    </button>
                    <button onclick="bukaLink()" class="w-full sm:w-44 py-3 border border-white text-white font-montserrat font-black text-xs uppercase tracking-wider rounded hover:bg-white/10 transition-all cursor-pointer">
                        Log In
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- MEDIA PLAYER CONTAINER -->
    <section class="max-w-5xl mx-auto px-4 pt-8">
        <div class="w-full bg-black rounded-xl overflow-hidden border border-white/10 shadow-2xl flex flex-col">
            <div id="playerContainer" class="relative w-full aspect-video flex flex-col items-center justify-center p-4 sm:p-8 text-center bg-neutral-950">
                
                <!-- BACKGROUND IMAGE CONTAINER -->
                <div id="playerBackground" class="hidden absolute inset-0 z-0 bg-cover bg-center brightness-[0.5]"></div>
                
                <div class="relative z-10 max-w-lg flex flex-col items-center px-2">
                    <h3 class="text-sm sm:text-xl lg:text-2xl font-bold text-gray-200 tracking-tight leading-snug">
                        KHSAA TV is only available for Registered Users. 
                        Create a <span class="text-hsGreen font-extrabold">FREE</span> account to get access to your HD stream
                    </h3>
                    <div id="playerTimer" class="mt-8 flex flex-col items-center space-y-3">
                        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-hsGreen"></div>
                        <p class="text-sm text-gray-300 font-semibold">
                            Connecting... Please wait <span id="countdownText" class="text-hsGreen font-bold">3</span>s
                        </p>
                    </div>
                    <button id="registerBtn" onclick="bukaLink()" class="hidden mt-8 px-8 py-4 bg-hsGreen hover:bg-hsGreenHover text-white font-montserrat font-black text-sm uppercase rounded-full transition-all hover:scale-105 active:scale-95 shadow-lg shadow-hsGreen/30 cursor-pointer">
                        CREATE A FREE ACCOUNT
                    </button>
                </div>
            </div>
            
            <div class="w-full bg-[#111111] border-t border-white/10 px-4 py-3.5 flex items-center justify-between gap-4">
                <button onclick="bukaLink()" class="text-gray-300 hover:text-white"><i data-lucide="play" class="w-4 h-4"></i></button>
                <div onclick="bukaLink()" class="flex-grow bg-gray-800 h-1.5 rounded-full cursor-pointer overflow-hidden">
                    <div class="bg-blue-600 h-full seeker-progress"></div>
                </div>
                <button onclick="bukaLink()" class="text-gray-400 hover:text-white"><i data-lucide="maximize" class="w-4 h-4"></i></button>
            </div>
        </div>
        <button onclick="bukaLink()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-b-xl cursor-pointer shadow-lg shadow-blue-500/10">
            <span class="font-montserrat font-black text-xs text-white tracking-widest uppercase">WATCH LIVE GAME TODAY</span>
        </button>
    </section>

    <!-- AD SPACES -->
    <section class="max-w-4xl mx-auto px-4 mt-8 space-y-4">
        <div class="w-full flex items-center justify-center min-h-[50px] border border-dashed border-white/10 rounded-xl text-[9px] text-gray-600 uppercase">AD SPACE</div>
        <div class="w-full flex items-center justify-center min-h-[50px] border border-dashed border-white/10 rounded-xl text-[9px] text-gray-600 uppercase">AD SPACE</div>
    </section>

    <!-- DUA KOTAK FOTO TAMBAHAN -->
    <section class="max-w-4xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-3">
                <div onclick="bukaLink()" class="cursor-pointer border border-white/10 rounded-lg overflow-hidden bg-neutral-900">
                    <img src="bs1.png" alt="Baseball" class="object-fit-container">
                </div>
                <a href="javascript:void(0)" onclick="bukaLink()" class="text-center text-[10px] sm:text-xs font-bold text-gray-300 hover:text-white uppercase transition-colors underline underline-offset-4">
                    BASEBALL STATE TOURNAMENT 2026
                </a>
            </div>
            <div class="flex flex-col gap-3">
                <div onclick="bukaLink()" class="cursor-pointer border border-white/10 rounded-lg overflow-hidden bg-neutral-900">
                    <img src="sf1.png" alt="Softball" class="object-fit-container">
                </div>
                <a href="javascript:void(0)" onclick="bukaLink()" class="text-center text-[10px] sm:text-xs font-bold text-gray-300 hover:text-white uppercase transition-colors underline underline-offset-4">
                    SOFTBALL STATE TOURNAMENT 2026
                </a>
            </div>
        </div>
    </section>

    <footer class="bg-black py-12 text-center text-xs text-gray-500 mt-8">
        &copy; 2026 High School Sports TV Network.
    </footer>

    <script>
        lucide.createIcons();
        const directLink = "https://www.google.com";
        function bukaLink() { window.open(directLink, '_blank'); }

        let timeLeft = 3;
        const countdownText = document.getElementById('countdownText');
        const playerTimer = document.getElementById('playerTimer');
        const registerBtn = document.getElementById('registerBtn');
        const playerBackground = document.getElementById('playerBackground');

        // Ganti URL ini dengan link gambar background Anda
        playerBackground.style.backgroundImage = "url('khsaa.png')";

        const countdownInterval = setInterval(() => {
            timeLeft--;
            countdownText.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                playerTimer.classList.add('hidden');
                registerBtn.classList.remove('hidden');
                playerBackground.classList.remove('hidden');
            }
        }, 1000);
    </script>
</body>
</html>
